name: Update Funding Progress

on:
  schedule:
    - cron: '0 0,8,16 * * *' # Runs automatically 3 times a day (Midnight, 8 AM, 4 PM UTC)
  workflow_dispatch: # Allow manual triggers

jobs:
  update-funding:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Funding Script
        env:
          BMC_TOKEN: ${{ secrets.BMC_TOKEN }}
          BMC_START_DATE: '2026-07-07' # Adjust this to your exact start date
        run: python scripts/fetch_bmc_funding.py

      - name: Commit to funding-data branch
        run: |
          # We check out the orphan branch 'funding-data'
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Move the generated file out temporarily
          mv app/src/main/assets/funding.json /tmp/funding.json
          
          # Switch to funding-data branch, create it if it doesn't exist
          git checkout --orphan funding-data || git checkout funding-data
          
          # Clear all other files from the branch to keep it clean
          git rm -rf .
          
          # Bring the JSON file back
          mv /tmp/funding.json funding.json
          
          # Add and commit
          git add funding.json
          git commit -m "Automated funding progress update" || exit 0
          
          # Push to the funding-data branch
          git push origin HEAD:funding-data --force
